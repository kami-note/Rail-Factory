# Rail Factory — Development / Homologation infrastructure (Phase 0)
# One PostgreSQL per tenant; this Compose provides one default DB + Redis + RabbitMQ + Nginx gateway.
# See docs/08_Development_Order.md and docs/03_Architecture.md.

services:
  gateway:
    image: nginx:alpine
    container_name: rail-factory-gateway
    ports:
      - "${GATEWAY_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/gateway/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: rail-factory-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-railfactory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-railfactory_secret}
      POSTGRES_DB: ${POSTGRES_DB:-railfactory_tenant_default}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-iam-db.sh:/docker-entrypoint-initdb.d/init-iam-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-railfactory} -d ${POSTGRES_DB:-railfactory_tenant_default}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rail-factory-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rail-factory-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-railfactory}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-railfactory_secret}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
