# Rail Factory — API Gateway (reverse proxy)
# Routes /api/<service>/ to backend microservices. See docs/10_Infrastructure_And_Env.md.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    # Upstream backends (host ports when services run via dotnet run on host)
    upstream backend_iam         { server host.docker.internal:5243; }
    upstream backend_production  { server host.docker.internal:5244; }
    upstream backend_dashboard   { server host.docker.internal:5245; }
    upstream backend_supplychain { server host.docker.internal:5246; }
    upstream backend_logistics   { server host.docker.internal:5247; }
    upstream backend_fleet      { server host.docker.internal:5248; }
    upstream backend_hcm        { server host.docker.internal:5249; }

    server {
        listen 80;
        server_name localhost;

        # Gateway health (no backend)
        location = /gateway/health {
            default_type application/json;
            return 200 '{"status":"Healthy","service":"gateway","timestamp":"$time_iso8601"}\n';
            add_header Content-Type application/json;
        }

        # IAM — auth, /me, /tenant, /health
        location /api/iam/ {
            rewrite ^/api/iam(/.*)$ $1 break;
            proxy_pass http://backend_iam;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # Production
        location /api/production/ {
            rewrite ^/api/production(/.*)$ $1 break;
            proxy_pass http://backend_production;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # Dashboard
        location /api/dashboard/ {
            rewrite ^/api/dashboard(/.*)$ $1 break;
            proxy_pass http://backend_dashboard;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # Supply Chain
        location /api/supplychain/ {
            rewrite ^/api/supplychain(/.*)$ $1 break;
            proxy_pass http://backend_supplychain;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # Logistics
        location /api/logistics/ {
            rewrite ^/api/logistics(/.*)$ $1 break;
            proxy_pass http://backend_logistics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # Fleet
        location /api/fleet/ {
            rewrite ^/api/fleet(/.*)$ $1 break;
            proxy_pass http://backend_fleet;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # HCM
        location /api/hcm/ {
            rewrite ^/api/hcm(/.*)$ $1 break;
            proxy_pass http://backend_hcm;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Id $http_x_tenant_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # Root: list available paths
        location = / {
            default_type application/json;
            return 200 '{"service":"Rail Factory Gateway","paths":["/gateway/health","/api/iam/","/api/production/","/api/dashboard/","/api/supplychain/","/api/logistics/","/api/fleet/","/api/hcm/"]}\n';
            add_header Content-Type application/json;
        }
    }
}
